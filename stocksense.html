<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StockSense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFBFF;
  --surface:#FFFFFF;
  --primary:#2A5BFF;
  --primary-dark:#1A3FCC;
  --primary-light:#EEF2FF;
  --ink:#0F1A38;
  --ink-soft:#5C6685;
  --ink-faint:#94A0BE;
  --border:#E6EAF5;
  --success:#16A34A;
  --success-light:#EAFBF1;
  --warning:#D97F0A;
  --warning-light:#FFF6E8;
  --danger:#E23B3B;
  --danger-light:#FDECEC;
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow:0 10px 30px -12px rgba(20,30,70,0.12), 0 2px 8px -2px rgba(20,30,70,0.06);
  --shadow-sm:0 2px 8px -2px rgba(20,30,70,0.08);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.01em;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--primary-light);}
a{color:inherit;}

/* ---------- Layout ---------- */
#app{min-height:100vh;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:
  radial-gradient(circle at 15% 20%, #EAF0FF 0%, transparent 45%),
  radial-gradient(circle at 85% 80%, #EAF6FF 0%, transparent 45%), var(--bg);}
.auth-card{width:100%;max-width:420px;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:36px 32px;border:1px solid var(--border);}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.auth-logo .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.auth-logo .mark svg{width:18px;height:18px;}
.auth-logo span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;}
.auth-sub{color:var(--ink-soft);font-size:14px;margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);}
.field .hint{font-size:12px;color:var(--ink-faint);margin-top:4px;}
.field .err{font-size:12px;color:var(--danger);margin-top:4px;display:none;}
.field.invalid input{border-color:var(--danger);}
.field.invalid .err{display:block;}
.btn{border:none;border-radius:var(--radius-sm);padding:11px 18px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,box-shadow .15s,background .15s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 16px -6px rgba(42,91,255,.55);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-block{width:100%;}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger-ghost{background:var(--danger-light);color:var(--danger);}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;}
.auth-switch{text-align:center;font-size:13.5px;color:var(--ink-soft);margin-top:18px;}
.auth-switch b{color:var(--primary);cursor:pointer;font-weight:600;}
.auth-switch b:hover{text-decoration:underline;}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.banner{padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start;}
.banner-info{background:var(--primary-light);color:var(--primary-dark);}
.banner-err{background:var(--danger-light);color:#B32222;}
.banner-ok{background:var(--success-light);color:#0F7A3D;}

/* ---------- Shell ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{width:236px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:6px 8px 22px 8px;}
.sidebar-logo .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(145deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sidebar-logo .mark svg{width:17px;height:17px;}
.sidebar-logo span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--ink-soft);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:2px;transition:background .12s,color .12s;}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.nav-item:hover{background:var(--primary-light);color:var(--primary-dark);}
.nav-item.active{background:var(--primary);color:#fff;}
.nav-section-label{font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin:16px 12px 8px;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.trial-pill{background:var(--primary-light);border-radius:12px;padding:12px;font-size:12.5px;color:var(--primary-dark);margin-bottom:10px;}
.trial-pill b{display:block;font-size:13.5px;margin-bottom:2px;}
.trial-pill.warn{background:var(--warning-light);color:#8A5A05;}
.trial-pill.expired{background:var(--danger-light);color:#B32222;}

.main{flex:1;min-width:0;}
.topbar{height:66px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:10;}
.searchbox{display:flex;align-items:center;gap:9px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 13px;width:340px;}
.searchbox svg{width:16px;height:16px;color:var(--ink-faint);flex-shrink:0;}
.searchbox input{border:none;background:transparent;outline:none;font-size:13.5px;width:100%;color:var(--ink);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;}
.icon-btn svg{width:17px;height:17px;color:var(--ink-soft);}
.dot-badge{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:2px solid var(--surface);}
.avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Space Grotesk',sans-serif;}
.content{padding:26px 30px 60px;max-width:1400px;}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:23px;margin:0 0 4px;}
.page-head p{margin:0;color:var(--ink-soft);font-size:13.5px;}

/* ---------- Cards / grids ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{padding:18px 20px;position:relative;overflow:hidden;}
.stat-card .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.stat-card .ic svg{width:19px;height:19px;}
.stat-card .val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1;}
.stat-card .lbl{font-size:12.5px;color:var(--ink-soft);margin-top:6px;font-weight:500;}
.stat-card .trend{position:absolute;top:18px;right:18px;font-size:11.5px;font-weight:700;padding:3px 7px;border-radius:6px;}
.trend.up{background:var(--success-light);color:var(--success);}
.trend.down{background:var(--danger-light);color:var(--danger);}
.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
.section-card{padding:20px 22px;margin-bottom:16px;}
.section-card h3{font-size:15.5px;margin:0 0 3px;}
.section-card .sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 16px;}
.row-between{display:flex;align-items:center;justify-content:space-between;}

/* health gauge */
.health-wrap{display:flex;align-items:center;gap:18px;}
.gauge{position:relative;width:128px;height:128px;flex-shrink:0;}
.gauge svg{transform:rotate(-90deg);}
.gauge-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gauge-label .num{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;}
.gauge-label .of{font-size:10.5px;color:var(--ink-faint);margin-top:-2px;}
.risk-pill{display:inline-block;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;margin-top:8px;}
.health-list{list-style:none;padding:0;margin:10px 0 0;font-size:12.5px;color:var(--ink-soft);}
.health-list li{padding:4px 0;display:flex;gap:7px;}

.ai-tip{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--border);}
.ai-tip:first-child{border-top:none;padding-top:0;}
.ai-tip .dot{width:26px;height:26px;border-radius:8px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.ai-tip p{margin:0;font-size:13px;line-height:1.5;color:var(--ink);}

.bars{display:flex;align-items:flex-end;gap:10px;height:140px;padding-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.bar-fill{width:100%;max-width:34px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--primary),var(--primary-dark));position:relative;min-height:3px;}
.bar-col .blbl{font-size:10.5px;color:var(--ink-faint);margin-top:7px;}
.bar-col .bval{font-size:10px;color:var(--ink-soft);font-weight:600;margin-bottom:4px;}

.empty{text-align:center;padding:46px 20px;color:var(--ink-soft);}
.empty .ic{width:52px;height:52px;border-radius:14px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.empty .ic svg{width:24px;height:24px;}
.empty h4{margin:0 0 6px;color:var(--ink);font-size:15px;}
.empty p{margin:0 0 16px;font-size:13px;}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:700;padding:0 14px 10px;border-bottom:1px solid var(--border);}
td{padding:13px 14px;font-size:13.5px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
.tag{display:inline-flex;align-items:center;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;}
.tag-ok{background:var(--success-light);color:var(--success);}
.tag-low{background:var(--warning-light);color:var(--warning);}
.tag-out{background:var(--danger-light);color:var(--danger);}
.tag-neutral{background:var(--primary-light);color:var(--primary-dark);}
.prod-cell{display:flex;align-items:center;gap:10px;}
.prod-thumb{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.prod-thumb svg{width:16px;height:16px;color:var(--ink-faint);}
.icon-action{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center;margin-left:6px;}
.icon-action svg{width:14px;height:14px;color:var(--ink-soft);}
.icon-action:hover{border-color:var(--primary);}
.icon-action.danger:hover{border-color:var(--danger);}
.icon-action.danger:hover svg{color:var(--danger);}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.toolbar .searchbox{width:280px;}
.toolbar select{padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:#fff;color:var(--ink-soft);outline:none;}
.spacer{flex:1;}
.pillbtn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12.5px;font-weight:600;color:var(--ink-soft);background:#fff;}
.pillbtn.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,55,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
.modal.wide{max-width:760px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.modal-head h3{margin:0;font-size:17px;}
.modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.modal-close svg{width:14px;height:14px;}
.modal-body{padding:22px 24px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border);position:sticky;bottom:0;background:#fff;}
.confirm-modal{max-width:380px;text-align:center;padding:28px 26px;}
.confirm-modal .ic{width:48px;height:48px;border-radius:12px;background:var(--danger-light);color:var(--danger);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.confirm-modal .ic svg{width:22px;height:22px;}
.confirm-modal h3{margin:0 0 8px;font-size:16px;}
.confirm-modal p{margin:0 0 20px;font-size:13.5px;color:var(--ink-soft);}
.confirm-row{display:flex;gap:10px;justify-content:center;}

.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;animation:slidein .2s ease;}
.toast.ok{background:#0F7A3D;}
.toast.err{background:#B32222;}
@keyframes slidein{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

.cart-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.cart-row:last-child{border-bottom:none;}
.qty-stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.qty-stepper button{width:26px;height:26px;background:var(--bg);border:none;font-size:14px;}
.qty-stepper span{width:32px;text-align:center;font-size:13px;font-weight:600;}

.invoice-preview{border:1px dashed var(--border);border-radius:12px;padding:20px;background:var(--bg);}
@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:absolute;top:0;left:0;width:100%;padding:20px;}
}
.badge-count{background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:8px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

@media(max-width:980px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:-260px;transition:left .2s;z-index:50;}
  .sidebar.open{left:0;}
  .searchbox{width:180px;}
  .formgrid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ============================================================
   STOCKSENSE — Stage 1 (Auth, Dashboard, Products, Categories,
   Stock, Billing). Data persisted via window.storage.
   ============================================================ */

const STORE_KEY = 'stocksense:data';
const TRIAL_DAYS = 60;

const ICONS = {
  box:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>',

  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></svg>',

  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/><path d="M10 11v6M14 11v6"/></svg>',

function bindAuth(){

  const toSignup=document.getElementById('toSignup');

  if(toForgot) toForgot.onclick=()=>{S.authMode='forgot';S.authError=null;render();};

  const signupForm=document.getElementById('signupForm');
  if(signupForm) signupForm.onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(signupForm);
    const mobile=f.get('mobile').trim();
    if(mobile.length!==10 || !/^\d+$/.test(mobile)){ S.authError='Please enter a valid 10-digit mobile number.'; render(); return; }
    if(f.get('password').length<6){ S.authError='Password must be at least 6 characters.'; render(); return; }
    const now=new Date();
    const trialEnd=new Date(now.getTime()+TRIAL_DAYS*86400000);
    DB.user={
      businessName:f.get('businessName').trim(),
      ownerName:f.get('ownerName').trim(),
      mobile, email:f.get('email').trim().toLowerCase(),
      password:f.get('password'),
      address:'', gst:'', currency:'₹',
      signupDate: now.toISOString(),
      trialEndDate: trialEnd.toISOString(),
      subscriptionStatus:'trial'
    };
    saveDB();
    S.loggedIn=true; S.authError=null; S.view='dashboard';
    render();
    toast('Welcome to StockSense! Your 60-day free trial has started.');
  };

  const loginForm=document.getElementById('loginForm');
  if(loginForm) loginForm.onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(loginForm);
    const email=f.get('email').trim().toLowerCase();
    if(!DB.user || DB.user.email!==email || DB.user.password!==f.get('password')){
      S.authError='Incorrect email or password.'; render(); return;
    }
    S.loggedIn=true; S.authError=null;
    render();
    toast('Logged in successfully.');
  };

  const forgotForm=document.getElementById('forgotForm');
  if(forgotForm) forgotForm.onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(forgotForm);
    const email=f.get('email').trim().toLowerCase();
    if(!DB.user || DB.user.email!==email){ S.authError='No account found with that email.'; render(); return; }
    S.authMode='login'; S.authError=null; render();
    toast("If this were live, we'd email you a reset link. For now, use your original password.",'info');

function computeStats(){
  const products=DB.products;
  const totalValue = products.reduce((s,p)=>s+(p.purchasePrice*p.quantity),0);
  const lowStock = products.filter(p=>p.quantity>0 && p.quantity<=p.minStock);
  const outStock = products.filter(p=>p.quantity===0);
  const today=todayISO();
  const salesOf=(days)=>{
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
    return DB.invoices.filter(inv=>new Date(inv.date)>=cutoff).reduce((s,i)=>s+i.grandTotal,0);
  };
  const todaySales = DB.invoices.filter(inv=>inv.date.slice(0,10)===today).reduce((s,i)=>s+i.grandTotal,0);
  return {
    totalProducts:products.length,
    totalCategories:DB.categories.length,
    lowStock, outStock,
    totalValue,
    todaySales,
    weekSales:salesOf(7),
    monthSales:salesOf(30),
  };
}

function computeHealth(st){
  let score=100;
  const p=DB.products.length;
  if(p>0){
    score -= Math.min(30,(st.outStock.length/p)*100*0.6);
    score -= Math.min(20,(st.lowStock.length/p)*100*0.3);
  }
  const prevWeek = (()=>{
    const start=new Date(); start.setDate(start.getDate()-14);
    const end=new Date(); end.setDate(end.getDate()-7);
    return DB.invoices.filter(i=>new Date(i.date)>=start && new Date(i.date)<end).reduce((s,i)=>s+i.grandTotal,0);
  })();
  let growthNote=null;
  if(prevWeek>0){
    const growth=((st.weekSales-prevWeek)/prevWeek)*100;
    if(growth<0) score -= Math.min(20,Math.abs(growth)*0.3);
    growthNote = growth;
  }
  const deadStock = DB.products.filter(pr=>{
    const moved = DB.stockHistory.some(h=>h.productId===pr.id && daysBetween(h.date,new Date())<=90);
    return !moved && daysBetween(pr.dateAdded,new Date())>90;
  });
  score -= Math.min(15, deadStock.length*3);
  score = Math.max(0, Math.round(score));
  let risk='Low', riskColor='var(--success)', riskBg='var(--success-light)';
  if(score<50){ risk='High'; riskColor='var(--danger)'; riskBg='var(--danger-light)'; }
  else if(score<75){ risk='Medium'; riskColor='var(--warning)'; riskBg='var(--warning-light)'; }
  return {score,risk,riskColor,riskBg,deadStock,growthNote};
}

function generateAiTips(st,health){
  const tips=[];
  if(st.outStock.length>0) tips.push(`${st.outStock.length} product${st.outStock.length>1?'s are':' is'} out of stock — restock soon to avoid losing sales.`);
  const fastMovers = DB.products.map(p=>{
    const sold = DB.stockHistory.filter(h=>h.productId===p.id && h.type==='out' && daysBetween(h.date,new Date())<=14).reduce((s,h)=>s+h.qty,0);
    return {p,sold};
  }).filter(x=>x.sold>0).sort((a,b)=>b.sold-a.sold);
  if(fastMovers.length){
    const top=fastMovers[0];
    tips.push(`"${top.p.name}" is selling fast (${top.sold} sold in 14 days). Consider ordering ${Math.max(5,Math.ceil(top.sold*0.5))} more pieces.`);
  }
  if(st.lowStock.length>0){
    const names=st.lowStock.slice(0,2).map(p=>p.name).join(', ');
    tips.push(`Low stock on ${names}${st.lowStock.length>2?` and ${st.lowStock.length-2} more`:''} — reorder before you run out.`);
  }
  if(health.deadStock.length>0) tips.push(`${health.deadStock.length} product${health.deadStock.length>1?'s have':' has'} had no movement in 90 days — consider a discount to clear it.`);
  const slow = DB.products.filter(p=>{
    const sold = DB.stockHistory.filter(h=>h.productId===p.id && h.type==='out').length;
    return sold===0 && daysBetween(p.dateAdded,new Date())>21;
  });
  if(slow.length>0) tips.push(`${slow.length} product${slow.length>1?'s are':' is'} not selling well. Reduce your next purchase for these.`);
  if(tips.length===0) tips.push('Everything looks healthy right now. Keep an eye on stock levels as sales come in.');
  return tips.slice(0,4);
}

function renderDashboard(){
  const st=computeStats();
  const health=computeHealth(st);
  const tips=generateAiTips(st,health);
  const recent=[...DB.products].sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded)).slice(0,5);

  const last7=[...Array(7)].map((_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const iso=d.toISOString().slice(0,10);
    const total=DB.invoices.filter(inv=>inv.date.slice(0,10)===iso).reduce((s,i)=>s+i.grandTotal,0);
    return {label:d.toLocaleDateString('en-IN',{weekday:'short'}),total};
  });
  const maxSale=Math.max(1,...last7.map(d=>d.total));

  const catStats = DB.categories.map(c=>{
    const items=DB.products.filter(p=>p.category===c.name);
    const val=items.reduce((s,p)=>s+p.purchasePrice*p.quantity,0);
    return {name:c.name, count:items.length, val};
  }).sort((a,b)=>b.val-a.val).slice(0,6);
  const maxCat=Math.max(1,...catStats.map(c=>c.val));

  if(DB.products.length===0){
    return `<div class="card empty">
      <div class="ic">${ICONS.box}</div>
      <h4>No products yet</h4>
      <p>Add your first product to start seeing dashboard insights.</p>
      <button class="btn btn-primary" id="emptyAddProduct">${ICONS.plus}Add your first product</button>
    </div>`;
  }

  return `
  <div class="stat-grid">
    ${statCard(ICONS.box,'var(--primary)','var(--primary-light)',st.totalProducts,'Total Products')}
    ${statCard(ICONS.layers,'#0EA5A5','#E6FBFA',st.totalCategories,'Categories')}
    ${statCard(ICONS.alert,'var(--warning)','var(--warning-light)',st.lowStock.length,'Low Stock Items')}
    ${statCard(ICONS.alert,'var(--danger)','var(--danger-light)',st.outStock.length,'Out of Stock')}
  </div>
  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">
    ${statCard(ICONS.wallet,'var(--primary)','var(--primary-light)',fmtMoney(st.totalValue),'Total Stock Value')}
    ${statCard(ICONS.receipt,'var(--success)','var(--success-light)',fmtMoney(st.todaySales),"Today's Sales")}
    ${statCard(ICONS.receipt,'#0EA5A5','#E6FBFA',fmtMoney(st.monthSales),'Sales (30 days)')}
  </div>

  <div class="dash-grid">
    <div>
      <div class="card section-card">
        <div class="row-between"><div><h3>Sales — last 7 days</h3><p class="sub">Daily revenue from invoices</p></div></div>
        <div class="bars">
          ${last7.map(d=>`<div class="bar-col"><div class="bval">${d.total>0?fmtMoney(d.total):''}</div><div class="bar-fill" style="height:${Math.max(4,(d.total/maxSale)*100)}%"></div><div class="blbl">${d.label}</div></div>`).join('')}
        </div>
      </div>
      <div class="card section-card">
        <div class="row-between"><div><h3>Stock value by category</h3><p class="sub">Where your inventory value sits</p></div></div>
        ${catStats.length? catStats.map(c=>`
          <div style="margin-bottom:12px;">
            <div class="row-between" style="margin-bottom:5px;"><span style="font-size:13px;font-weight:600;">${escapeHtml(c.name)}</span><span style="font-size:12px;color:var(--ink-soft);">${fmtMoney(c.val)} · ${c.count} items</span></div>
            <div style="height:8px;background:var(--bg);border-radius:6px;overflow:hidden;"><div style="height:100%;width:${(c.val/maxCat)*100}%;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:6px;"></div></div>
          </div>`).join('') : `<p class="sub">Add categories to see this breakdown.</p>`}
      </div>
      <div class="card section-card">
        <div class="row-between"><h3>Recently added products</h3></div>
        <table><thead><tr><th>Product</th><th>Category</th><th>Qty</th><th>Added</th></tr></thead><tbody>
          ${recent.map(p=>`<tr><td>${prodCell(p)}</td><td>${escapeHtml(p.category)||'—'}</td><td>${p.quantity}</td><td>${fmtDate(p.dateAdded)}</td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>
    <div>
      <div class="card section-card">
        <h3>Business Health Score</h3>
        <p class="sub">Based on stock levels, sales trend &amp; dead stock</p>
        <div class="health-wrap">
          ${gaugeSvg(health.score,health.riskColor)}
          <div>
            <span class="risk-pill" style="background:${health.riskBg};color:${health.riskColor};">${health.risk} Risk</span>
            <ul class="health-list">
              <li>${ICONS.check.replace('<svg','<svg style="width:13px;color:var(--ink-faint)"')} ${st.outStock.length} items out of stock</li>
              <li>${ICONS.check.replace('<svg','<svg style="width:13px;color:var(--ink-faint)"')} ${st.lowStock.length} items low on stock</li>
              <li>${ICONS.check.replace('<svg','<svg style="width:13px;color:var(--ink-faint)"')} ${health.deadStock.length} slow-moving items</li>
            </ul>
          </div>
        </div>
      </div>
      <div class="card section-card">
        <div class="row-between"><h3>${ICONS.spark.replace('<svg','<svg style="width:15px;vertical-align:-2px;color:var(--primary)"')} AI Suggestions</h3></div>
        ${tips.map(t=>`<div class="ai-tip"><div class="dot">${ICONS.spark.replace('<svg','<svg style="width:13px;height:13px"')}</div><p>${escapeHtml(t)}</p></div>`).join('')}
      </div>
    </div>
  </div>`;
}

function statCard(icon,color,bg,val,lbl){
  return `<div class="card stat-card"><div class="ic" style="background:${bg};color:${color};">${icon}</div><div class="val">${val}</div><div class="lbl">${lbl}</div></div>`;
}
function gaugeSvg(score,color){
  const r=52, c=2*Math.PI*r, off=c-(score/100)*c;
  return `<div class="gauge"><svg width="128" height="128" viewBox="0 0 128 128">
    <circle cx="64" cy="64" r="${r}" fill="none" stroke="#EEF1F8" stroke-width="12"/>
    <circle cx="64" cy="64" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .6s;"/>
  </svg><div class="gauge-label"><div class="num">${score}</div><div class="of">/ 100</div></div></div>`;
}
function prodCell(p){
  return `<div class="prod-cell"><div class="prod-thumb">${p.image?`<img src="${escapeAttr(p.image)}">`:ICONS.image}</div><div><div style="font-weight:600;">${escapeHtml(p.name)}</div><div style="font-size:11.5px;color:var(--ink-faint);">${escapeHtml(p.code)}</div></div></div>`;
}

function renderProducts(){

    <button class="pillbtn ${S.productStockFilter==='low'?'active':''}" data-filt="low">Low stock</button>

      ${list.map(p=>`<tr>

        <td>${escapeHtml(p.category)||'—'}</td>
        <td>${escapeHtml(p.brand)||'—'}</td>
        <td>${fmtMoney(p.purchasePrice)}</td>

function stockTag(p){
  if(p.quantity===0) return `<span class="tag tag-out">Out of stock</span>`;
  if(p.quantity<=p.minStock) return `<span class="tag tag-low">Low stock</span>`;
  return `<span class="tag tag-ok">In stock</span>`;
}

}

function openProductModal(product){
  S.modal={
    title: product?'Edit Product':'Add Product',
    body: productForm(product),
    wide:true,
    onSave:(form)=>{
      const f=new FormData(form);
      const name=f.get('name').trim();
      const pp=parseFloat(f.get('purchasePrice')), sp=parseFloat(f.get('sellingPrice'));
      const qty=parseInt(f.get('quantity')), minStock=parseInt(f.get('minStock'));
      if(!name){ toast('Product name is required.','err'); return false; }
      if(isNaN(pp)||pp<0||isNaN(sp)||sp<0){ toast('Enter valid prices.','err'); return false; }
      if(isNaN(qty)||qty<0||isNaN(minStock)||minStock<0){ toast('Enter valid stock numbers.','err'); return false; }
      const data={
        name, code:f.get('code'), barcode:f.get('barcode').trim(), category:f.get('category'),
        brand:f.get('brand').trim(), supplier:f.get('supplier').trim(), size:f.get('size').trim(), color:f.get('color').trim(),
        purchasePrice:pp, sellingPrice:sp, quantity:qty, minStock:minStock,
        image:f.get('image').trim(), description:f.get('description').trim(),
      };
      if(product){
        Object.assign(product,data);
        toast('Product updated.');
      } else {
        data.id='p'+uid('product'); data.dateAdded=new Date().toISOString(); data.code='PRD'+String(DB.seq.product-1).padStart(4,'0');
        DB.products.push(data);
        toast('Product added.');
      }
      saveDB();
      return true;
    }
  };
  render();
}

function openCategoryModal(cat){

    title: cat?'Edit Category':'Add Category',

    onSave:(form)=>{

function renderStock(){
  const hist=[...DB.stockHistory].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(DB.products.length===0){
    return `<div class="card empty"><div class="ic">${ICONS.swap}</div><h4>Add products first</h4><p>You need products before you can record stock movements.</p><button class="btn btn-primary" id="emptyGoProducts">Go to Products</button></div>`;
  }
  return `<div class="card">
    ${hist.length? `<table><thead><tr><th>Date</th><th>Product</th><th>Type</th><th>Qty</th><th>Reason</th></tr></thead><tbody>
      ${hist.map(h=>{
        const p=DB.products.find(x=>x.id===h.productId);
        return `<tr><td>${fmtDate(h.date)}</td><td>${p?escapeHtml(p.name):'(deleted)'}</td><td>${stockTypeTag(h.type)}</td><td>${h.type==='out'?'-':'+'}${h.qty}</td><td style="color:var(--ink-soft);">${escapeHtml(h.reason)||'—'}</td></tr>`;
      }).join('')}
    </tbody></table>`: `<div class="empty"><div class="ic">${ICONS.swap}</div><h4>No stock movements yet</h4><p>Record stock in, stock out, or an adjustment to see history here.</p></div>`}
  </div>`;
}
function stockTypeTag(t){
  if(t==='in') return `<span class="tag tag-ok">Stock In</span>`;
  if(t==='out') return `<span class="tag tag-out">Stock Out</span>`;
  return `<span class="tag tag-neutral">Adjustment</span>`;
}

function openStockModal(){
  S.modal={
    title:'Record Stock Movement',
    body:`<div class="modal-body">
      <div class="field"><label>Movement type *</label>
        <select name="type">
          <option value="in">Stock In (purchase / restock)</option>
          <option value="out">Stock Out (damage / sample / other)</option>
          <option value="adjust">Adjustment (correct count)</option>
        </select>
      </div>
      <div class="field"><label>Product *</label>
        <select name="productId" required>
          <option value="">Select product</option>
          ${DB.products.map(p=>`<option value="${p.id}">${escapeHtml(p.name)} (current: ${p.quantity})</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Quantity *</label><input name="qty" type="number" min="1" value="1" required></div>
      <div class="field"><label>Reason / note</label><input name="reason" placeholder="e.g. New purchase from supplier"></div>
    </div>`,
    onSave:(form)=>{
      const f=new FormData(form);
      const productId=f.get('productId');
      const qty=parseInt(f.get('qty'));
      const type=f.get('type');
      if(!productId){ toast('Please select a product.','err'); return false; }
      if(isNaN(qty)||qty<=0){ toast('Enter a valid quantity.','err'); return false; }
      const p=DB.products.find(x=>x.id===productId);
      if(type==='out' && qty>p.quantity){ toast('Not enough stock to remove.','err'); return false; }
      const oldQty=p.quantity;
      let logQty=qty;
      if(type==='in') p.quantity+=qty;
      else if(type==='out') p.quantity-=qty;
      else { p.quantity=qty; logQty=Math.abs(qty-oldQty); } // adjustment sets absolute count
      DB.stockHistory.push({id:'s'+uid('stock'),productId,type,qty:logQty,reason:f.get('reason').trim(),date:new Date().toISOString()});
      saveDB();
      toast('Stock movement recorded.');
      return true;
    }
  };
  render();
}

function invoiceTotals(){
  const sub=S.cart.reduce((s,i)=>s+i.qty*i.price,0);
  const discAmt=sub*(Number(S.invoiceMeta.discount)||0)/100;
  const afterDisc=sub-discAmt;
  const gstAmt=afterDisc*(Number(S.invoiceMeta.gst)||0)/100;
  const total=afterDisc+gstAmt;
  return {sub,discAmt,gstAmt,total};
}

    </div>`:''}
  </div>`;
}

   SETTINGS
   ================================================== */

    <div>
      <div class="card section-card">
        <h3>Business details</h3>

            <div class="field"><label>Business name</label><input name="businessName" value="${escapeAttr(u.businessName)}" required></div>
            <div class="field"><label>Owner name</label><input name="ownerName" value="${escapeAttr(u.ownerName)}" required></div>

        ${t.status!=='active'?`<button class="btn btn-primary btn-block" id="upgradeBtnSettings">Upgrade to Premium — ₹149/month</button>`:''}

function openUpgradeModal(){
  S.modal={
    title:'Upgrade to Premium',
    body:`<div class="modal-body">
      <div style="text-align:center;padding:6px 0 18px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;">₹149<span style="font-size:14px;color:var(--ink-soft);font-weight:500;"> /month</span></div>
        <p style="color:var(--ink-soft);font-size:13px;margin-top:4px;">Unlimited products · AI Suggestions · Reports · Cloud Backup · Analytics · Priority Support</p>
      </div>
      <div class="banner banner-info">Payment integration (UPI / QR) isn't connected yet in this preview. Clicking below simulates a successful upgrade for demo purposes.</div>
    </div>`,
    hideCancelSave:true,
    custom:'upgrade'
  };
  render();
}

/* ==================================================
   MODAL (generic add/edit + special cases)
   ================================================== */
function renderModal(){
  const m=S.modal;
  const body = m.custom==='invoice' ? renderInvoiceModalBody() : m.body;
  return `<div class="overlay" id="modalOverlay"><div class="modal ${m.wide?'wide':''}">
    <div class="modal-head"><h3>${m.title}</h3><button class="modal-close" id="modalCloseBtn">${ICONS.close}</button></div>
    <form id="modalForm">${body}</form>
    <div class="modal-foot">
      ${m.custom==='upgrade'? `<button class="btn btn-ghost" id="modalCancel">Not now</button><button class="btn btn-primary" id="modalConfirmUpgrade">Simulate Payment &amp; Upgrade</button>` :
        m.custom==='invoice' ? `<button class="btn btn-ghost" id="modalCancel">Cancel</button><button class="btn btn-primary" id="modalSaveInvoice" ${S.cart.length===0?'disabled':''}>Save Invoice</button>` :
        `<button class="btn btn-ghost" id="modalCancel">Cancel</button><button class="btn btn-primary" id="modalSave">Save</button>`}
    </div>
  </div></div>`;
}

function closeModal(){ S.modal=null; S.billingCart=false; render(); }

function bindModal(){
  const overlay=document.getElementById('modalOverlay');
  if(!overlay) return;
  overlay.onclick=(e)=>{ if(e.target===overlay) closeModal(); };
  document.getElementById('modalCloseBtn').onclick=closeModal;
  const cancel=document.getElementById('modalCancel');
  if(cancel) cancel.onclick=closeModal;
  const form=document.getElementById('modalForm');
  if(form) form.onsubmit=(e)=>e.preventDefault();

  const m=S.modal;
  if(m.custom==='upgrade'){
    document.getElementById('modalConfirmUpgrade').onclick=()=>{
      DB.user.subscriptionStatus='active'; saveDB();
      closeModal(); render();
      toast('Upgraded to Premium! (Demo mode)');
    };
    return;
  }
  if(m.custom==='invoice'){
    const sel=document.getElementById('invProductSelect');
    sel.onchange=()=>{
      const id=sel.value; if(!id) return;
      const p=DB.products.find(x=>x.id===id);
      const existing=S.cart.find(i=>i.productId===id);
      if(existing){ if(existing.qty<p.quantity) existing.qty++; else toast('Not enough stock available.','err'); }
      else S.cart.push({productId:p.id,name:p.name,price:p.sellingPrice,qty:1,maxQty:p.quantity});
      S.modal.body=renderInvoiceModalBody(); renderModalInPlace();
    };
    document.querySelectorAll('[data-cartplus]').forEach(b=>b.onclick=()=>{
      const idx=+b.getAttribute('data-cartplus'); const it=S.cart[idx]; const p=DB.products.find(x=>x.id===it.productId);
      if(it.qty<p.quantity) it.qty++; else toast('Not enough stock available.','err');
      renderModalInPlace();
    });
    document.querySelectorAll('[data-cartminus]').forEach(b=>b.onclick=()=>{
      const idx=+b.getAttribute('data-cartminus'); S.cart[idx].qty=Math.max(1,S.cart[idx].qty-1);
      renderModalInPlace();
    });
    document.querySelectorAll('[data-cartdel]').forEach(b=>b.onclick=()=>{
      const idx=+b.getAttribute('data-cartdel'); S.cart.splice(idx,1); renderModalInPlace();
    });
    const custEl=document.getElementById('invCustomer');
    if(custEl) custEl.oninput=()=>{ S.invoiceMeta.customerName=custEl.value; };
    const discEl=document.getElementById('invDiscount');
    if(discEl) discEl.oninput=()=>{ S.invoiceMeta.discount=discEl.value; renderModalInPlace(); };
    const gstEl=document.getElementById('invGst');
    if(gstEl) gstEl.oninput=()=>{ S.invoiceMeta.gst=gstEl.value; renderModalInPlace(); };

    const saveBtn=document.getElementById('modalSaveInvoice');
    if(saveBtn) saveBtn.onclick=()=>{
      if(S.cart.length===0) return;
      const t=invoiceTotals();
      const inv={
        id:'inv'+uid('invoice'),
        invoiceNo:'INV-'+String(DB.seq.invoice-1).padStart(5,'0'),
        customerName:S.invoiceMeta.customerName,
        date:new Date().toISOString(),
        items:S.cart.map(i=>({productId:i.productId,name:i.name,price:i.price,qty:i.qty})),
        subtotal:t.sub, discountAmt:t.discAmt, gstAmt:t.gstAmt, grandTotal:t.total,
      };
      S.cart.forEach(i=>{
        const p=DB.products.find(x=>x.id===i.productId);
        p.quantity-=i.qty;
        DB.stockHistory.push({id:'s'+uid('stock'),productId:i.productId,type:'out',qty:i.qty,reason:'Sale — '+inv.invoiceNo,date:new Date().toISOString()});
      });
      DB.invoices.push(inv);
      saveDB();
      closeModal();
      S.viewingInvoice=inv;
      S.view='billing';
      render();
      toast('Invoice created and stock updated.');
    };
    return;
  }

  const saveBtn=document.getElementById('modalSave');
  if(saveBtn) saveBtn.onclick=()=>{
    const ok=m.onSave(document.getElementById('modalForm'));
    if(ok!==false){ closeModal(); render(); }
  };
}

function renderModalInPlace(){
  const overlay=document.getElementById('modalOverlay');
  if(!overlay) return;
  const focusInfo=captureFocus(overlay);
  overlay.outerHTML = renderModal();
  bindModal();
  restoreFocus(focusInfo);
}

/* ==================================================
   PAGE BINDINGS
   ================================================== */
function bindPage(){
  const addP=document.getElementById('addProductBtn')||document.getElementById('emptyAddProduct');
  if(addP) addP.onclick=()=>openProductModal(null);
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const p=DB.products.find(x=>x.id===b.getAttribute('data-edit'));
    openProductModal(p);
  });
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const id=b.getAttribute('data-del');
    const p=DB.products.find(x=>x.id===id);
    S.confirm={title:'Delete this product?',msg:`"${p.name}" will be permanently removed. This can't be undone.`,onYes:()=>{
      DB.products=DB.products.filter(x=>x.id!==id);
      saveDB(); render(); toast('Product deleted.');
    }};
    render();
  });
  const prodSearch=document.getElementById('prodSearchInput');
  if(prodSearch) prodSearch.oninput=(e)=>{ S.productSearch=e.target.value; renderPage(); };
  const prodCatFilter=document.getElementById('prodCatFilter');
  if(prodCatFilter) prodCatFilter.onchange=(e)=>{ S.productCat=e.target.value; renderPage(); };
  document.querySelectorAll('[data-filt]').forEach(b=>b.onclick=()=>{ S.productStockFilter=b.getAttribute('data-filt'); renderPage(); });

  const addC=document.getElementById('addCategoryBtn')||document.getElementById('emptyAddCategory');
  if(addC) addC.onclick=()=>openCategoryModal(null);
  document.querySelectorAll('[data-editcat]').forEach(b=>b.onclick=()=>{
    const c=DB.categories.find(x=>x.id===b.getAttribute('data-editcat'));
    openCategoryModal(c);
  });
  document.querySelectorAll('[data-delcat]').forEach(b=>b.onclick=()=>{
    const id=b.getAttribute('data-delcat');
    const c=DB.categories.find(x=>x.id===id);
    const inUse=DB.products.filter(p=>p.category===c.name).length;
    S.confirm={title:'Delete this category?',msg: inUse? `${inUse} product${inUse===1?'':'s'} use this category. They will become uncategorized.` : `"${c.name}" will be permanently removed.`,onYes:()=>{
      DB.categories=DB.categories.filter(x=>x.id!==id);
      DB.products.forEach(p=>{ if(p.category===c.name) p.category=''; });
      saveDB(); render(); toast('Category deleted.');
    }};
    render();
  });

  const addS=document.getElementById('addStockBtn');
  if(addS) addS.onclick=openStockModal;
  const goProd=document.getElementById('emptyGoProducts');
  if(goProd) goProd.onclick=()=>{ S.view='products'; render(); };

  const newInv=document.getElementById('newInvoiceBtn')||document.getElementById('emptyNewInvoice');
  if(newInv) newInv.onclick=openInvoiceBuilder;
  document.querySelectorAll('[data-viewinv]').forEach(b=>b.onclick=()=>{
    S.viewingInvoice=DB.invoices.find(x=>x.id===b.getAttribute('data-viewinv'));
    renderPage();
  });
  const backBtn=document.getElementById('backToInvoices');
  if(backBtn) backBtn.onclick=()=>{ S.viewingInvoice=null; renderPage(); };
  const printBtn=document.getElementById('printInvoiceBtn');
  if(printBtn) printBtn.onclick=()=>window.print();

  const settingsForm=document.getElementById('settingsForm');
  if(settingsForm) settingsForm.onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(settingsForm);
    DB.user.businessName=f.get('businessName').trim();
    DB.user.ownerName=f.get('ownerName').trim();
    DB.user.mobile=f.get('mobile').trim();
    DB.user.address=f.get('address').trim();
    DB.user.gst=f.get('gst').trim();
    DB.user.currency=f.get('currency').trim()||'₹';
    saveDB();
    toast('Business details saved.');
    render();
  };
  const upSettings=document.getElementById('upgradeBtnSettings');
  if(upSettings) upSettings.onclick=openUpgradeModal;
  const settingsLogout=document.getElementById('settingsLogout');
  if(settingsLogout) settingsLogout.onclick=logout;
}

/* ==================================================
   INIT
   ================================================== */
(async function init(){
  render(); // loading screen
  const data = await loadDB();
  if(data){ DB=Object.assign(freshDB(),data); DB.seq=Object.assign({product:1,category:1,stock:1,invoice:1},data.seq||{}); }
  LOADED=true;
  if(DB.user) S.loggedIn=false; // still require login each session
  render();
})();
</script>
